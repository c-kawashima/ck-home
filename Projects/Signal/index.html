const DECK_BUILDER_PROMPT = `You are building a data-dense, opinionated presentation deck in the style of Chamath Palihapitiya's All-In summit talks.
INPUTS: [transcripts and data below]

─── COLOR THEME (Renesas corporate) ───
PRIMARY PALETTE — use these for 90%+ of all visuals:
  Navy (primary bg/headers): #06418C
  Dark Navy (hero/gradients): #042D5E
  Blue (secondary/accents): #4471A9
  Light Blue (card backgrounds): #E8F0F8
  Gray (neutral/borders/muted text): #6B7280
  Light Gray (slide bg alt): #F5F5F5
  Text: #2A2A2A on light, #FFFFFF on dark
SPARINGLY — only when meaning demands it:
  Purple (light accent only, rare): #993399
  Red (critical alerts only, very rare): #D70000
  Green (confirmed positive only, very rare): #669933
Slide backgrounds alternate between white and dark navy.
Charts and data viz use navy, blue, gray as primary colors.
Do NOT default to red/green for bullish/bearish — use navy
vs light blue, or solid vs dashed lines instead.

─── ANALYTICAL METHOD ───
Before outlining slides, identify:
1. The 3-4 core TENSIONS in this material — where does conventional wisdom clash with the data? Where do two true things contradict each other?
2. The single most consequential number in the dataset — the one that reframes the conversation. This opens the deck.
3. The strongest counterargument to your thesis. This gets its own slide.
Build the deck around resolving these tensions, not around summarizing topics.

─── SLIDE RULES ───
- Every slide must contain at least 2 specific data points (numbers, %, $, named sources, dates). More is better. Density signals rigor.
- Classify each data callout as: ANCHOR (frames the argument), SUPPORT (reinforces the point), or TENSION (complicates the thesis, adds credibility)
- Slide titles ≤ 6 words. Assertions, not labels. Bad: "Market Overview." Good: "The $40B Nobody Noticed."
- Bullet test: would this change how someone allocates capital or makes a decision? If not, cut it.
- Every noun must refer to something specific and nameable. "The market" fails. "US enterprise SaaS" passes.
- Slides should reward a second read — first pass gives the headline, second pass reveals something you missed. That's dense. Not cluttered.

─── STRUCTURE (arc, not rigid) ───
1. OPEN: One data point that makes the audience think "wait, really?" — the reframe.
2. CONTEXT (2-3): What most people believe vs. what the data shows. Establish the gap.
3. THESIS (3-4): Interconnected insights that build sequentially — each slide raises a question the next one answers. Not standalone islands.
4. EVIDENCE (2-3): The receipts. Annotate what matters in the data — don't just display it.
5. RED TEAM (1): The strongest case against your thesis. Then dismantle it with data. This separates analysis from advocacy.
6. IMPLICATIONS (2): If the thesis is right, what follows? Name specific companies, sectors, dollar amounts, timelines. No vague "winners and losers."
7. CLOSE (1): The single thing to remember. No "in conclusion" energy.
8. APPENDIX (1-2): Tables with key data. 3-column format: Column 1 = Category, Column 2 = KPI, Column 3 = Why it's relevant or important.

─── DO NOT ───
- Write any bullet that could appear in a generic deck on the same topic
- Summarize what was said in the transcript — synthesize it into a point of view with a direction
- Create symmetric slides (same bullet count, same length) — vary density based on what the content demands
- Start any bullet with "It is important to note" or "There is a growing trend"
- Use any noun without a specific referent

TARGET: 12-15 slides. For each slide, provide:
- Title (≤6 words, assertion not label)
- Content (2-5 bullets, variable density)
- Data callouts (with ANCHOR / SUPPORT / TENSION label)
- Speaker notes with three sections:

  THE POINT: What this slide is arguing, in 2-3 sentences. State the conclusion first, then the evidence. Include what the audience probably believes coming in and where this slide breaks that assumption.

  THE PUSHBACK: The strongest objection a smart skeptic in the room would raise. Not a strawman — the real objection, the one that would make you pause. Name the type: data challenge, logic gap, alternative explanation, or scope limitation.

  THE RESPONSE: How you'd handle it live. Not defensive — either concede the narrow point and redirect ("Fair, but that misses the bigger picture which is..."), or counter with specific data. If you can't rebut it cleanly, the slide's argument isn't strong enough — revise the slide.`;

const INTEL_BRIEFING_PROMPT = `INTELLIGENCE BRIEF PROMPT
PERSONA: You are a senior McKinsey partner briefing a PE
investment committee. You think like an operator — if it
can't be executed Monday morning, it doesn't belong here.
Your job is not to summarize. It's to synthesize, challenge,
and advise. Every section should pass the test: "Would a
board member change a decision based on this?"
Analyze the following industry transcripts across
semiconductor, automotive, robotics, and electronics.
Produce a structured intelligence briefing.
Depth is earned, not given — only expand a section when the
data warrants it. If a section doesn't have enough substance
to justify inclusion this week, say so in one sentence and
move on. A short brief that's honest beats a long one
that's padded. Never hedge without naming what you're
hedging against and why.
─────────────────────────────────────────
1. EXECUTIVE SUMMARY (4 sentences. Structured as follows.)
─────────────────────────────────────────
Sentence 1: The single most important signal this week.
Sentence 2: What has materially changed since last week.
Sentence 3: The strategic implication — who wins, who's
exposed, what shifts.
Sentence 4: What's at stake if this read is wrong.
This is what a CEO reads standing up before a board meeting.
No scene-setting. No throat-clearing.
─────────────────────────────────────────
2. CROSS-CHANNEL THEMES
─────────────────────────────────────────
3–5 themes that appear across multiple sources. A theme only
qualifies if ignoring it would be a strategic mistake.
For each:
- Theme name (sharp, not generic — "Inventory correction"
  not "Supply chain dynamics")
- Which channels raised it
- Business implication in one sentence
- Where the concept is complex or counterintuitive, include
  a sharp analogy inline: [Concept] → [Analogy] → [Why it
  maps]. Only where it genuinely clarifies — not decorative.
- Where warranted: 1–2 sentences of supporting context
─────────────────────────────────────────
3. NEW SYNTHESIS — IDEAS NOT EXPLICITLY SAID
─────────────────────────────────────────
This is the alpha. Move it here because it's the
highest-value section, not an afterthought.
What connections across channels, or logical extensions of
what was said, produce a new insight that no single source
explicitly made? Minimum 2 observations, no ceiling. If you
find more, include them all.
For each: name the sources you're connecting, the inference,
and why it matters. If an inference is speculative, say so
— but don't let that stop you from making it.
─────────────────────────────────────────
4. CONTRARIAN SIGNALS & WHERE THE SMART MONEY DISAGREES
─────────────────────────────────────────
(Merges former Sections 3 and 6.)
Two parts:
CONSENSUS MAP: Where do sources broadly agree? If consensus
is overwhelming, explain why agreement itself might be a
risk signal — crowded trades exist in strategy too.
DISAGREEMENTS & CONTRARIAN TAKES: 2–4 views that most
people are missing, downplaying, or getting backwards. For
each:
- The contrarian view, stated directly
- The strongest case FOR the consensus position
- Why the contrarian read may be right anyway
- Source(s) and supporting evidence
If a disagreement has real stakes — competing forecasts,
opposing strategic bets — develop both sides fully. This
is where the brief earns its keep.
─────────────────────────────────────────
5. KEY DATA — KPI TABLE
─────────────────────────────────────────
| Metric | Value | Type | Strategic Implication |
|--------|-------|------|----------------------|
Minimum 8 rows. No ceiling — include every significant
quantitative data point. Do not cut for brevity.
Type column values:
  ANCHOR = frames the entire argument
  SUPPORT = reinforces a theme
  TENSION = complicates the thesis, adds credibility
Every noun in the Implication column must be specific and
nameable. "The market is shifting" fails. "TSMC's 3nm
utilization at 85% signals hyperscaler demand pull-in
ahead of H2 capex cycle" passes.
─────────────────────────────────────────
6. PREDICTIONS & TIMELINES
─────────────────────────────────────────
Every forward-looking claim with its source and timeframe.
Tag each: [HIGH CONFIDENCE] / [MEDIUM] / [SPECULATIVE]
For high-confidence predictions, include the reasoning.
For speculative ones, name what would need to be true for
them to play out.
─────────────────────────────────────────
7. PRACTICAL IMPACT — "SO WHAT?"
─────────────────────────────────────────
For each major theme or finding above: what should someone
actually do differently because of this?
Each recommendation must include:
- The specific action (not "consider" or "evaluate" —
  the actual move)
- Who it's relevant to (role, function, or company type
  — let the content dictate this, don't force verticals)
- What's at risk if they don't act
- Timeframe: this week / this quarter / this year
If a recommendation is obvious enough that any competent
exec would already be doing it, cut it. Only include
advice that changes behavior.
─── IMPLICATIONS ───
Close with 2-3 second-order implications — the downstream
effects that aren't obvious yet but follow logically from
the week's signals. These don't need to be actionable.
They need to be worth watching. Tag each with a timeframe
for when you'd expect the implication to become visible.
─────────────────────────────────────────
8. INTERNAL CONSISTENCY CHECK
─────────────────────────────────────────
Before finalizing: review your predictions (Section 6),
recommendations (Section 7), and synthesis (Section 3).
Flag any tensions between them explicitly. If your
contrarian view in Section 4 contradicts your advice in
Section 7, that's not a bug — but you must acknowledge it
and explain why both can be true, or revise.
─────────────────────────────────────────
GLOBAL RULES:
- Cite all claims by channel name
- Be merciless with jargon — translate technical concepts
  into business language without losing precision
- Every noun must refer to something specific and nameable
- Write for a reader with no time and high stakes
- If the transcripts are thin this week, the brief should
  be shorter. Don't invent depth that isn't there.`;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getDaysAgo(video) {
  if (video.upload_date && /^\d{8}$/.test(video.upload_date)) {
    const d = video.upload_date;
    const uploaded = new Date(`${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}T00:00:00Z`);
    return Math.max(0, Math.floor((Date.now() - uploaded.getTime()) / 86400000));
  }
  return video.days_ago ?? 999;
}

function timeAgo(video) {
  const d = getDaysAgo(video);
  if (d === 0) return "Today";
  if (d === 1) return "Yesterday";
  if (d < 7) return `${d}d ago`;
  if (d < 30) return `${Math.floor(d / 7)}w ago`;
  return `${Math.floor(d / 30)}mo ago`;
}

function isNew(video) {
  return getDaysAgo(video) <= 7;
}

function getChannel(data, channelId) {
  for (const cat of data.categories) {
    for (const ch of cat.channels) {
      if (ch.id === channelId) return ch;
    }
  }
  return null;
}

function getAllChannels(data) {
  return data.categories.flatMap(c => c.channels);
}

function findRelevantVideos(videos, query, limit = 5, filters = {}) {
  let pool = videos;

  // Apply timeframe filter
  if (filters.days) {
    pool = pool.filter(v => getDaysAgo(v) <= filters.days);
  }

  // Apply channel filter
  if (filters.channels && filters.channels.length > 0) {
    pool = pool.filter(v => filters.channels.includes(v.channel_id));
  }

  if (!query.trim()) return pool.slice(0, limit);

  const terms = query.toLowerCase().split(/\s+/).filter(t => t.length > 2);
  if (terms.length === 0) return pool.slice(0, limit);

  const scored = pool.map(v => {
    let score = 0;
    terms.forEach(t => {
      if (v.title.toLowerCase().includes(t)) score += 3;
      if (v.summary.toLowerCase().includes(t)) score += 2;
      if ((v.topics || []).some(tag => tag.toLowerCase().includes(t))) score += 2;
      if ((v.key_insights || []).some(i => i.toLowerCase().includes(t))) score += 1;
    });
    return { video: v, score };
  }).filter(x => x.score > 0).sort((a, b) => b.score - a.score);

  return scored.slice(0, limit).map(x => x.video);
}

function buildContext(videos, data) {
  return videos.map(v => {
    const ch = getChannel(data, v.channel_id);
    const lines = [
      `[${ch?.name || v.channel_id}] "${v.title}" (${timeAgo(v)})`,
      `Summary: ${v.full_summary || v.summary}`,
      (v.key_insights || []).length > 0 ? `Key insights:\n${v.key_insights.map(i => `- ${i}`).join('\n')}` : '',
      (v.host_takes || []).length > 0 ? `Host positions:\n${v.host_takes.map(t => `- ${t}`).join('\n')}` : '',
      (v.predictions || []).length > 0 ? `Predictions:\n${v.predictions.map(p => `- ${p}`).join('\n')}` : '',
      (v.key_quotes || []).length > 0 ? `Notable quotes:\n${v.key_quotes.map(q => `- "${q}"`).join('\n')}` : '',
      (v.transcript) ? `Transcript excerpt:\n${v.transcript.slice(0, 3000)}...` : '',
    ].filter(Boolean);
    return lines.join('\n');
  }).join('\n\n---\n\n');
}

function buildVideoContext(video, channel) {
  const lines = [
    `[${channel?.name || video.channel_id}] "${video.title}" (${timeAgo(video)})`,
    `Summary: ${video.full_summary || video.one_liner || video.summary}`,
    (video.segment_summaries || []).length > 0 ? `Segments:\n${video.segment_summaries.map(s => `- ${s}`).join('\n')}` : '',
    (video.key_insights || []).length > 0 ? `Key insights:\n${video.key_insights.map(i => `- ${i}`).join('\n')}` : '',
    (video.host_takes || []).length > 0 ? `Host positions:\n${video.host_takes.map(t => `- ${t}`).join('\n')}` : '',
    (video.predictions || []).length > 0 ? `Predictions:\n${video.predictions.map(p => `- ${p}`).join('\n')}` : '',
    (video.key_quotes || []).length > 0 ? `Notable quotes:\n${video.key_quotes.map(q => `- "${q}"`).join('\n')}` : '',
    // Transcript intentionally excluded — structured fields above already contain all extracted intelligence.
  ].filter(Boolean);
  return lines.join('\n\n');
}

}

// ─── PER-VIDEO EXPORT PANEL ───────────────────────────────────────────────────
function VideoExportPanel({ video, channel, transcript, detailLoading }) {
  const [copyState, setCopyState] = useState('idle');

  function buildVideoPayload() {
    const chName = channel?.name || video.channel_id;
    const parts = [
      `[${chName}] "${video.title}" (${timeAgo(video)})`,
      video.url ? `URL: ${video.url}` : '',
      video.one_liner ? `Summary: ${video.one_liner}` : '',
      (video.full_summary || video.summary) ? `Full summary: ${video.full_summary || video.summary}` : '',
      (video.key_insights || []).length > 0 ? `\nKey insights:\n${video.key_insights.map(i => `- ${i}`).join('\n')}` : '',
      (video.host_takes || []).length > 0 ? `\nHost positions:\n${video.host_takes.map(t => `- ${t}`).join('\n')}` : '',
      (video.kpi_table || []).length > 0 ? `\nKPIs:\n${video.kpi_table.map(k => `- ${k.kpi}: ${k.value} — ${k.context}`).join('\n')}` : '',
      (video.predictions || []).length > 0 ? `\nPredictions:\n${video.predictions.map(p => `- ${p}`).join('\n')}` : '',
      (video.key_quotes || []).length > 0 ? `\nNotable quotes:\n${video.key_quotes.map(q => `- "${q}"`).join('\n')}` : '',
      transcript ? `\nTranscript:\n${transcript}` : ''
    ].filter(Boolean);
    return parts.join('\n');
  }

  // Build CW week number and date-based filename prefix
  function getFilePrefix() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    // ISO week number
    const jan1 = new Date(year, 0, 1);
    const days = Math.floor((now - jan1) / 86400000);
    const weekNum = Math.ceil((days + jan1.getDay() + 1) / 7);
    const cw = String(weekNum).padStart(2, '0');
    // Channel slug: lowercase, replace spaces/special chars with hyphens
    const chSlug = (channel?.name || video.channel_id || 'unknown')
      .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    return `CW${cw}_${year}_${month}_${day}_${chSlug}`;
  }

  const FILE_SAVE_INSTRUCTIONS = `
═══════════════════════════════════════════
FILE NAMING & SAVE LOCATION
═══════════════════════════════════════════
Save all output files to: ~/Documents/Cowork OS/Professional/Research & Analysis/research/

File naming format: ${getFilePrefix()}_[short-topic-slug].[ext]
  - [short-topic-slug] = 2-4 word lowercase kebab-case summary of the key theme
  - Examples:
    ${getFilePrefix()}_ai-talent-war.html
    ${getFilePrefix()}_ai-talent-war_briefing.md
    ${getFilePrefix()}_ai-talent-war_deck.pptx

ALL outputs from this video (HTML, briefing, deck) should share the same
prefix and topic slug. Only the suffix/extension changes.
═══════════════════════════════════════════`;

  function copyForBriefing() {
    const payload = buildVideoPayload();
    const text = `SIGNAL → SINGLE VIDEO BRIEFING\nGenerated: ${new Date().toLocaleDateString()}\nSource: ${channel?.name || video.channel_id}\n${FILE_SAVE_INSTRUCTIONS}\n\n${'─'.repeat(40)}\n${INTEL_BRIEFING_PROMPT}\n${'─'.repeat(40)}\n\nNote: This briefing is based on a single video, not a cross-channel batch.\nAdapt section depth accordingly — skip sections that require multiple sources.\nFocus on: Executive Summary, Key Data (KPI table), Predictions, and Practical Impact.\n\n${'═'.repeat(40)}\n\n${payload}`;
    navigator.clipboard.writeText(text).then(() => {
      setCopyState('briefing'); setTimeout(() => setCopyState('idle'), 2500);
    });
  }

  function copyForDeck() {
    const payload = buildVideoPayload();
    const text = `SIGNAL → SINGLE VIDEO DECK\nGenerated: ${new Date().toLocaleDateString()}\nSource: ${channel?.name || video.channel_id}\n${FILE_SAVE_INSTRUCTIONS}\n\n${'─'.repeat(40)}\n${DECK_BUILDER_PROMPT}\n${'─'.repeat(40)}\n\nNote: This deck is based on a single video source.\nFocus the TENSIONS methodology on internal tensions within this source's arguments.\nAim for 8-12 slides rather than 15-20.\n\n${'═'.repeat(40)}\n\n${payload}`;
    navigator.clipboard.writeText(text).then(() => {
      setCopyState('deck'); setTimeout(() => setCopyState('idle'), 2500);
    });
  }

  function copyForHTML() {
    const payload = buildVideoPayload();
    const text = `SIGNAL → SINGLE VIDEO VISUAL REPORT\nGenerated: ${new Date().toLocaleDateString()}\nSource: ${channel?.name || video.channel_id}\n${FILE_SAVE_INSTRUCTIONS}\n\n${'─'.repeat(40)}\n${HTML_REPORT_PROMPT}\n${'─'.repeat(40)}\n\nNote: This report is based on a single video source.\nAdapt sections that require cross-channel comparison — focus instead on\nthe depth of this source's data, predictions, and actionable insights.\nScale the report to match the content density — shorter is fine.\n\n${'═'.repeat(40)}\n\n${payload}`;
    navigator.clipboard.writeText(text).then(() => {
      setCopyState('html'); setTimeout(() => setCopyState('idle'), 2500);
    });
  }

  return (
    <div className="card" style={{padding:'14px 18px',marginBottom:'16px',borderLeft:'3px solid #6366f1'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'8px'}}>
        <div>
          <div style={{fontSize:'12px',fontWeight:'600',color:'var(--text-1)',marginBottom:'2px'}}>Export to Opus</div>
          <div style={{fontSize:'11px',color:'var(--text-4)'}}>
            {transcript ? 'Full transcript + structured data + prompt → clipboard' : detailLoading ? 'Loading transcript…' : 'Structured data + prompt (no transcript available)'}
          </div>
        </div>
        <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
          <button onClick={copyForBriefing} style={{
            background: copyState==='briefing' ? '#10b981' : '#6366f1',
            color:'white', border:'none', padding:'6px 14px', borderRadius:'7px',
            cursor:'pointer', fontSize:'12px', fontWeight:'500', transition:'background 0.2s', whiteSpace:'nowrap'
          }}>
            {copyState==='briefing' ? '✓ Copied' : '📋 Briefing'}
          </button>
          <button onClick={copyForDeck} className="deck-export-btn" style={{padding:'6px 14px',fontSize:'12px',whiteSpace:'nowrap'}}>
            {copyState==='deck' ? '✓ Copied' : '🎯 Deck'}
          </button>
          <button onClick={copyForHTML} style={{
            background: copyState==='html' ? '#10b981' : '#f59e0b',
            color:'white', border:'none', padding:'6px 14px', borderRadius:'7px',
            cursor:'pointer', fontSize:'12px', fontWeight:'500', transition:'background 0.2s', whiteSpace:'nowrap'
          }}>
            {copyState==='html' ? '✓ Copied' : '🌐 HTML Report'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── VIDEO CHAT VIEW ──────────────────────────────────────────────────────────
function VideoChatView({ video, detailData, data, onBack }) {
  const channel = getChannel(data, video.channel_id);
  const fullVideo = detailData || video;
  const context = buildVideoContext(fullVideo, channel);

  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [apiError, setApiError] = useState(null);
  const [sessionCost, setSessionCost] = useState(0);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  useEffect(() => {
    inputRef.current?.focus();
  }, []);

  const suggestions = [
    "What's the single biggest insight from this?",
    "Summarize the key debate or tension",
    "What predictions were made and are they credible?",
    "What would I tell a colleague about this?"
  ];

  async function sendMessage(text) {
    if (!text.trim() || loading) return;
    const userMsg = { role: 'user', content: text };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput('');
    setLoading(true);
    setApiError(null);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: newMessages.map(m => ({ role: m.role, content: m.content })),
          context,
          query: text,
          mode: 'video'
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        setApiError(res.status === 503
          ? "Add your ANTHROPIC_API_KEY to Vercel env vars to enable chat."
          : err.error || `Error ${res.status}`);
        setLoading(false);
        return;
      }

      const { reply, usage } = await res.json();
      if (usage?.cost_usd) setSessionCost(prev => prev + usage.cost_usd);
      setMessages(prev => [...prev, {
        role: 'assistant',
        content: reply,
        usage: usage || null
      }]);
    } catch (err) {
      setApiError("Add your ANTHROPIC_API_KEY to Vercel env vars to enable chat.");
    }
    setLoading(false);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input); }
  }

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',maxHeight:'100vh'}}>
      {/* Header */}
      <div style={{padding:'16px 24px 12px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        <div onClick={onBack} className="back-btn" style={{marginBottom:'8px',display:'inline-flex'}}>
          ← Back to video
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'8px'}}>
          <div>
            <div style={{fontSize:'15px',fontWeight:'600',color:'var(--text-1)',marginBottom:'2px'}}>
              💬 Chat about this video
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'6px',fontSize:'12px',color:'var(--text-4)'}}>
              {channel && <span className="channel-dot" style={{background:channel.color}}></span>}
              <span style={{color:'var(--text-3)',maxWidth:'400px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {video.title}
              </span>
            </div>
          </div>
          {sessionCost > 0 && (
            <div style={{fontSize:'11px',color:'var(--text-4)',background:'var(--bg-card)',border:'1px solid var(--border-med)',borderRadius:'6px',padding:'3px 8px'}}>
              session: <span style={{color:'var(--text-3)'}}>${sessionCost.toFixed(4)}</span>
            </div>
          )}
        </div>
        {/* Scope indicator */}
        <div style={{marginTop:'8px',display:'flex',alignItems:'center',gap:'6px',fontSize:'11px',color:'var(--text-4)',background:'var(--bg-hover)',borderRadius:'6px',padding:'5px 10px',width:'fit-content'}}>
          <span>🎯</span>
          <span>Scoped to this video only · full summary + all extracted insights</span>
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'20px 24px'}}>
        {messages.length === 0 && (
          <div>
            <div style={{textAlign:'center',padding:'30px 20px 24px',color:'var(--text-4)'}}>
              <div style={{fontSize:'28px',marginBottom:'8px'}}>💬</div>
              <div style={{fontSize:'14px',color:'var(--text-3)',marginBottom:'4px'}}>Ask anything about this video</div>
              <div style={{fontSize:'12px'}}>Context is scoped to this episode only — cheaper and more focused</div>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'8px',justifyContent:'center',marginBottom:'20px'}}>
              {suggestions.map(s => (
                <button key={s} className="suggestion-chip" onClick={() => sendMessage(s)}>{s}</button>
              ))}
            </div>
          </div>
        )}

        {messages.map((msg, i) => (
          <div key={i} style={{display:'flex',flexDirection:'column',alignItems:msg.role === 'user' ? 'flex-end' : 'flex-start',marginBottom:'16px'}}>
            {msg.role === 'user' ? (
              <div className="chat-bubble-user">{msg.content}</div>
            ) : (
              <div>
                <div className="chat-bubble-assistant">
                  <div className="prose-content" style={{whiteSpace:'pre-wrap'}}>{msg.content}</div>
                </div>
                {msg.usage && (
                  <div style={{fontSize:'10px',color:'var(--text-5)',marginTop:'4px',paddingLeft:'4px'}}>
                    {msg.usage.input_tokens}↑ {msg.usage.output_tokens}↓ tokens · ${msg.usage.cost_usd.toFixed(4)}
                  </div>
                )}
              </div>
            )}
          </div>
        ))}

        {loading && (

// ─── MAIN CHAT VIEW ───────────────────────────────────────────────────────────
const CHAT_STORAGE_KEY = 'signal_chat_history';
const MAX_STORED_MESSAGES = 100;

const TIMEFRAME_OPTIONS = [
  { label: 'All time', days: null },
  { label: 'Last 7d', days: 7 },
  { label: '2 weeks', days: 14 },
  { label: '3 weeks', days: 21 },
  { label: '1 month', days: 30 },
  { label: '6 weeks', days: 42 },
  { label: '2 months', days: 60 },
  { label: '3 months', days: 90 },
];

function ChatView({ data, initialQuery }) {
  const [messages, setMessages] = useState(() => {
    try {
      const stored = localStorage.getItem(CHAT_STORAGE_KEY);
      return stored ? JSON.parse(stored) : [];
    } catch { return []; }
  });
  const [input, setInput] = useState(initialQuery || '');
  const [loading, setLoading] = useState(false);
  const [apiError, setApiError] = useState(null);
  const [sessionCost, setSessionCost] = useState(0);
  const [filterDays, setFilterDays] = useState(null);
  const [filterChannels, setFilterChannels] = useState([]); // empty = all
  const [showFilters, setShowFilters] = useState(false);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  const allChannels = getAllChannels(data);
  const hasActiveFilters = filterDays !== null || filterChannels.length > 0;

  // Compute filtered pool for display
  const filteredPool = (() => {
    let pool = data.videos;
    if (filterDays) pool = pool.filter(v => getDaysAgo(v) <= filterDays);
    if (filterChannels.length > 0) pool = pool.filter(v => filterChannels.includes(v.channel_id));
    return pool;
  })();

  useEffect(() => {
    try {
      localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(messages.slice(-MAX_STORED_MESSAGES)));
    } catch {}
  }, [messages]);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading]);

  useEffect(() => {
    if (initialQuery) sendMessage(initialQuery);
    inputRef.current?.focus();
  }, []);

  function clearHistory() {
    setMessages([]);
    localStorage.removeItem(CHAT_STORAGE_KEY);
  }

  function toggleChannel(id) {
    setFilterChannels(prev =>
      prev.includes(id) ? prev.filter(c => c !== id) : [...prev, id]
    );
  }

  const suggestions = [
    "What's the consensus on AI timelines?",
    "What are people saying about DeepSeek?",
    "Summarize this week's biggest themes",
    "How are different channels covering AI stocks?"
  ];

  async function sendMessage(text) {
    if (!text.trim() || loading) return;
    const userMsg = { role: 'user', content: text };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput('');
    setLoading(true);
    setApiError(null);

    const filters = { days: filterDays, channels: filterChannels.length > 0 ? filterChannels : null };
    const relevant = findRelevantVideos(data.videos, text, 5, filters);
    const context = buildContext(relevant, data);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: newMessages.map(m => ({ role: m.role, content: m.content })),
          context, query: text
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        setApiError(res.status === 503
          ? "Add your ANTHROPIC_API_KEY to Vercel env vars to enable chat."
          : err.error || `Error ${res.status}`);
        setLoading(false);
        return;
      }

      const { reply, usage } = await res.json();
      if (usage?.cost_usd) setSessionCost(prev => prev + usage.cost_usd);
      setMessages(prev => [...prev, {
        role: 'assistant',
        content: reply,
        usage: usage || null,
        sources: relevant.map(v => getChannel(data, v.channel_id))
          .filter(Boolean)
          .filter((ch, i, arr) => arr.findIndex(c => c.id === ch.id) === i),
        videoCount: relevant.length
      }]);
    } catch (err) {
      setApiError("Add your ANTHROPIC_API_KEY to Vercel env vars to enable chat.");
    }
    setLoading(false);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(input); }
  }

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',maxHeight:'100vh'}}>
      {/* Header */}
      <div style={{padding:'20px 24px 0',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
          <div>
            <div style={{fontSize:'18px',fontWeight:'600',color:'var(--text-1)',marginBottom:'3px'}}>Chat with Signal</div>
            <div style={{fontSize:'12px',color:'var(--text-4)'}}>
              {hasActiveFilters
                ? `Querying ${filteredPool.length} of ${data.videos.length} videos`

            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
            {sessionCost > 0 && (
              <div style={{fontSize:'11px',color:'var(--text-4)',background:'var(--bg-card)',border:'1px solid var(--border-med)',borderRadius:'6px',padding:'3px 8px'}}>

            <button onClick={() => setShowFilters(!showFilters)}
              className={`filter-pill ${hasActiveFilters ? 'active' : ''}`}>
              {hasActiveFilters ? '⚙ Filters on' : '⚙ Filters'}
            </button>
            {messages.length > 0 && (
              <button onClick={clearHistory} style={{background:'none',border:'1px solid var(--border-med)',borderRadius:'6px',color:'var(--text-4)',fontSize:'11px',padding:'4px 10px',cursor:'pointer'}}>
                Clear
              </button>
            )}
          </div>
        </div>

        {/* Filter bar */}
        {showFilters && (
          <div style={{paddingBottom:'12px',display:'flex',flexDirection:'column',gap:'10px'}}>
            {/* Timeframe */}
            <div>
              <div style={{fontSize:'11px',color:'var(--text-4)',fontWeight:'600',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'6px'}}>Timeframe</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
                {TIMEFRAME_OPTIONS.map(opt => (
                  <button key={opt.label}
                    className={`filter-pill ${filterDays === opt.days ? 'active' : ''}`}
                    onClick={() => setFilterDays(opt.days)}>

                  </button>
                ))}
              </div>
            </div>
            {/* Channels */}
            <div>
              <div style={{fontSize:'11px',color:'var(--text-4)',fontWeight:'600',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'6px'}}>
                Channels {filterChannels.length > 0 ? `(${filterChannels.length} selected)` : '(all)'}
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
                {allChannels.map(ch => (
                  <button key={ch.id}
                    onClick={() => toggleChannel(ch.id)}
                    style={{
                      display:'flex',alignItems:'center',gap:'5px',
                      padding:'4px 10px',borderRadius:'16px',fontSize:'12px',cursor:'pointer',
                      border:`1px solid ${filterChannels.includes(ch.id) ? ch.color : 'var(--border-med)'}`,

            {filteredPool.length === 0 && (

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'20px 24px'}}>
        {messages.length === 0 && (

            </div>

        {messages.map((msg, i) => (
          <div key={i} style={{display:'flex',flexDirection:'column',alignItems:msg.role === 'user' ? 'flex-end' : 'flex-start',marginBottom:'16px'}}>

// ─── INTEL DUMP BUILDER (uses pre-fetched detail data with transcripts) ───────
function buildIntelDump(detailedVideos, data) {
  if (!detailedVideos || detailedVideos.length === 0) return null;

  // Group by channel name, preserving order
  const byChannel = {};
  detailedVideos.forEach(v => {
    const ch = getChannel(data, v.channel_id);
    const name = ch?.name || v.channel_id;
    if (!byChannel[name]) byChannel[name] = [];
    byChannel[name].push(v);
  });

  const sections = Object.entries(byChannel).map(([chName, vids]) => {
    const vidBlocks = vids.map(v => {
      const lines = [
        `"${v.title}"`,
        `Published: ${timeAgo(v)}${v.duration ? ' · ' + v.duration : ''}`,
        v.url ? `URL: ${v.url}` : '',
        '',
        v.transcript
          ? `TRANSCRIPT:\n${v.transcript}`
          : `[No transcript — summary only]\n${v.one_liner || v.full_summary || v.summary || ''}`,
      ].filter(Boolean);
      return lines.join('\n');
    });
    const bar = '═'.repeat(56);
    return `${bar}\n  ${chName.toUpperCase()}\n${bar}\n\n${vidBlocks.join('\n\n' + '─'.repeat(40) + '\n\n')}`;
  });

  const header = [
    `SIGNAL TRANSCRIPT DUMP · ${detailedVideos.length} video${detailedVideos.length!==1?'s':''}`,
    `Generated: ${new Date().toLocaleString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})}`,
    '',
    '─'.repeat(56),
    INTEL_BRIEFING_PROMPT,
    '─'.repeat(56),
    '', '',
  ].join('\n');

  return header + sections.join('\n\n\n');
}

const DUMP_TIMEFRAMES_UNUSED = [
  { label: '7 days', days: 7 },
  { label: '14 days', days: 14 },
  { label: '21 days', days: 21 },
];

function WeeklyWrapView({ data }) {
  const [wrap, setWrap] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(false);
  const [dumpDays, setDumpDays] = useState(7);
  const [dumpChannels, setDumpChannels] = useState([]);
  const [copyState, setCopyState] = useState('idle'); // idle | fetching | copied | empty
  const allChannels = getAllChannels(data);

  const dumpPool = (() => {
    let pool = data.videos.filter(v => getDaysAgo(v) <= dumpDays);
    if (dumpChannels.length > 0) pool = pool.filter(v => dumpChannels.includes(v.channel_id));
    return pool;
  })();

  function toggleDumpChannel(id) {
    if (id === '__clear__') { setDumpChannels([]); return; }
    setDumpChannels(prev => prev.includes(id) ? prev.filter(c => c !== id) : [...prev, id]);
  }

  // Batch file naming: CWxx_year_month_day_signal-batch_[topic-slug].[ext]
  function getBatchFileInstructions(numVideos) {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const jan1 = new Date(year, 0, 1);
    const days = Math.floor((now - jan1) / 86400000);
    const weekNum = Math.ceil((days + jan1.getDay() + 1) / 7);
    const cw = String(weekNum).padStart(2, '0');
    const prefix = `CW${cw}_${year}_${month}_${day}_signal-batch`;
    return `\n${'═'.repeat(40)}\nFILE NAMING & SAVE LOCATION\n${'═'.repeat(40)}\nSave all output files to: ~/Documents/Cowork OS/Professional/Research & Analysis/research/\n\nFile naming: ${prefix}_[short-topic-slug].[ext]\n  - [short-topic-slug] = 2-4 word kebab-case key theme\n  - Examples: ${prefix}_ai-capex-gap.html, ${prefix}_ai-capex-gap_briefing.md, ${prefix}_ai-capex-gap_deck.pptx\nALL outputs from this batch share the same prefix + topic slug. Only suffix/ext changes.\n${'═'.repeat(40)}\n`;
  }

  async function handleCopyIntel() {
    if (dumpPool.length === 0) { setCopyState('empty'); setTimeout(() => setCopyState('idle'), 2000); return; }
    setCopyState('fetching');
    const detailed = await Promise.all(
      dumpPool.map(v =>
        fetch(`/data/videos/${v.id}.json`)
          .then(r => r.ok ? r.json() : v)
          .catch(() => v)
      )
    );
    detailed.sort((a, b) => getDaysAgo(a) - getDaysAgo(b));
    const text = buildIntelDump(detailed, data);
    if (!text) { setCopyState('empty'); setTimeout(() => setCopyState('idle'), 2000); return; }
    const fullText = text.replace('SIGNAL TRANSCRIPT DUMP', 'SIGNAL TRANSCRIPT DUMP' + getBatchFileInstructions(detailed.length));
    navigator.clipboard.writeText(fullText).then(() => {
      setCopyState('copied');
      setTimeout(() => setCopyState('idle'), 4000);
    });
  }

  async function handleCopyDeck() {
    if (dumpPool.length === 0) { setCopyState('empty'); setTimeout(() => setCopyState('idle'), 2000); return; }
    setCopyState('fetching');
    const detailed = await Promise.all(
      dumpPool.map(v => fetch(`/data/videos/${v.id}.json`).then(r => r.ok ? r.json() : v).catch(() => v))
    );
    detailed.sort((a, b) => getDaysAgo(a) - getDaysAgo(b));
    const transcripts = detailed.map(v => {
      const ch = getChannel(data, v.channel_id);
      return `[${ch?.name}] "${v.title}" (${timeAgo(v)})\n${v.transcript || v.one_liner || v.full_summary || v.summary || ''}`;
    }).join('\n\n---\n\n');
    const text = `SIGNAL → DECK BUILDER\nGenerated: ${new Date().toLocaleDateString()}\n${detailed.length} videos analyzed\n${getBatchFileInstructions(detailed.length)}\n${'─'.repeat(40)}\n${DECK_BUILDER_PROMPT}\n${'─'.repeat(40)}\n\n${transcripts}`;

    if (dumpPool.length === 0) { setCopyState('empty'); setTimeout(() => setCopyState('idle'), 2000); return; }

      dumpPool.map(v => fetch(`/data/videos/${v.id}.json`).then(r => r.ok ? r.json() : v).catch(() => v))

    detailed.sort((a, b) => getDaysAgo(a) - getDaysAgo(b));

// ─── TOPIC INTELLIGENCE VIEW ─────────────────────────────────────────────────
function KnowledgeGraphView({ data, onVideo, onSelectChannel }) {
  const [timeframe, setTimeframe] = useState(30);
  const [expandedTopic, setExpandedTopic] = useState(null);
  const [sortBy, setSortBy] = useState('count'); // count | channels | trend

  const filtered = data.videos.filter(v => timeframe === null ? true : getDaysAgo(v) <= timeframe);

  // Build topic intelligence
  const topicData = {};
  filtered.forEach(video => {
    const ch = getChannel(data, video.channel_id);
    (video.topics || []).forEach(topic => {
      if (!topicData[topic]) topicData[topic] = { count: 0, channels: new Set(), channelList: [], videos: [], coTopics: {} };
      topicData[topic].count++;
      topicData[topic].channels.add(video.channel_id);
      topicData[topic].videos.push(video);
      // Track co-occurring topics
      (video.topics || []).forEach(other => {
        if (other !== topic) topicData[topic].coTopics[other] = (topicData[topic].coTopics[other] || 0) + 1;
      });
    });
  });

  // Detect parent/child topic hierarchy: "AI Talent War" is child of "AI"
  const topicNames = Object.keys(topicData);
  const hierarchy = {};
  topicNames.forEach(name => {
    const words = name.toLowerCase().split(/\s+/);
    const parent = topicNames.find(p =>
      p !== name && p.length < name.length && words.includes(p.toLowerCase()) && topicData[p].count >= 2
    );
    if (parent) {
      if (!hierarchy[parent]) hierarchy[parent] = [];
      hierarchy[parent].push(name);
    }
  });

  // Trend detection (recent 7d vs prior period)
  function getTrend(topic) {
    const recent = topic.videos.filter(v => getDaysAgo(v) <= 7).length;
    const older = topic.videos.filter(v => getDaysAgo(v) > 7).length;
    const olderWeeks = Math.max(1, (timeframe === null ? 12 : Math.floor(timeframe / 7)) - 1);
    const avgOlder = older / olderWeeks;
    if (recent > avgOlder * 1.3 && recent > 0) return 'hot';
    if (recent < avgOlder * 0.5 && avgOlder > 0) return 'cold';
    return 'stable';
  }

  const topicRows = Object.entries(topicData).map(([name, d]) => ({
    name, count: d.count, channelCount: d.channels.size,
    channels: [...d.channels].map(id => getChannel(data, id)).filter(Boolean),
    videos: d.videos, coTopics: Object.entries(d.coTopics).sort((a,b) => b[1]-a[1]).slice(0,5),
    trend: getTrend(d), children: hierarchy[name] || []
  })).sort((a,b) => {
    if (sortBy === 'channels') return b.channelCount - a.channelCount;
    if (sortBy === 'trend') return (a.trend === 'hot' ? -1 : a.trend === 'cold' ? 1 : 0) - (b.trend === 'hot' ? -1 : b.trend === 'cold' ? 1 : 0);
    return b.count - a.count;
  });

  return (
    <div style={{padding:'28px'}}>
      <div style={{marginBottom:'24px'}}>
        <div style={{fontSize:'22px',fontWeight:'600',color:'var(--text-1)',marginBottom:'4px'}}>🧠 Topic Intelligence</div>
        <div style={{fontSize:'13px',color:'var(--text-3)'}}>{topicRows.length} topics across {filtered.length} videos</div>
      </div>
      <div style={{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap'}}>
        {[{l:'7d',v:7},{l:'14d',v:14},{l:'30d',v:30},{l:'All',v:null}].map(o => (
          <button key={o.l} className={`filter-pill ${timeframe===o.v?'active':''}`} onClick={() => setTimeframe(o.v)}>{o.l}</button>
        ))}
        <span style={{color:'var(--text-5)',margin:'0 8px'}}>|</span>
        {[{l:'By Frequency',v:'count'},{l:'By Reach',v:'channels'},{l:'By Trend',v:'trend'}].map(o => (
          <button key={o.v} className={`filter-pill ${sortBy===o.v?'active':''}`} onClick={() => setSortBy(o.v)}>{o.l}</button>
        ))}
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <table className="kpi-table" style={{width:'100%'}}>
          <thead>
            <tr>
              <th>Topic</th>
              <th style={{width:'60px',textAlign:'center'}}>Videos</th>
              <th style={{width:'80px',textAlign:'center'}}>Channels</th>
              <th style={{width:'60px',textAlign:'center'}}>Trend</th>
              <th>Co-occurring Topics</th>
            </tr>
          </thead>
          <tbody>
            {topicRows.map(t => (
              <React.Fragment key={t.name}>
                <tr onClick={() => setExpandedTopic(expandedTopic === t.name ? null : t.name)}
                  style={{cursor:'pointer',background:expandedTopic===t.name?'var(--bg-hover)':'transparent',transition:'background 0.15s'}}>
                  <td style={{fontWeight:'500',color:'var(--text-1)'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                      <span style={{color:'var(--text-4)',fontSize:'10px'}}>{expandedTopic===t.name?'▼':'▶'}</span>
                      {t.name}
                      {t.children.length > 0 && <span style={{fontSize:'10px',color:'var(--text-4)',background:'var(--bg-hover)',borderRadius:'4px',padding:'1px 5px'}}>{t.children.length} sub</span>}
                    </div>
                  </td>
                  <td style={{textAlign:'center'}}><span style={{color:'#6366f1',fontWeight:'600'}}>{t.count}</span></td>
                  <td style={{textAlign:'center'}}>
                    <div style={{display:'flex',gap:'3px',justifyContent:'center'}}>
                      {t.channels.map(ch => <span key={ch.id} className="channel-dot" style={{background:ch.color}} title={ch.name}></span>)}
                    </div>
                  </td>
                  <td style={{textAlign:'center'}}>
                    {t.trend==='hot' && <span style={{color:'#10b981',fontWeight:'600',fontSize:'11px'}}>🔥 HOT</span>}
                    {t.trend==='cold' && <span style={{color:'#6e7681',fontSize:'11px'}}>↓ cold</span>}
                    {t.trend==='stable' && <span style={{color:'var(--text-5)',fontSize:'11px'}}>—</span>}
                  </td>
                  <td>
                    <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
                      {t.coTopics.map(([name,ct]) => <span key={name} className="tag" style={{fontSize:'10px'}}>{name} ({ct})</span>)}
                    </div>
                  </td>
                </tr>
                {expandedTopic === t.name && (
                  <tr><td colSpan={5} style={{padding:'12px 16px',background:'var(--bg)'}}>
                    {t.children.length > 0 && (
                      <div style={{marginBottom:'14px'}}>
                        <div style={{fontSize:'11px',fontWeight:'600',color:'var(--text-4)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'8px'}}>Sub-topics</div>
                        <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                          {t.children.map(child => {
                            const cd = topicData[child];
                            return <span key={child} className="tag" style={{cursor:'pointer',fontSize:'12px'}} onClick={e=>{e.stopPropagation();setExpandedTopic(child);}}>
                              {child} <span style={{color:'#6366f1',fontWeight:'600',marginLeft:'4px'}}>{cd?.count||0}</span>
                            </span>;
                          })}
                        </div>
                      </div>
                    )}
                    <div style={{fontSize:'11px',fontWeight:'600',color:'var(--text-4)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'8px'}}>Videos ({t.videos.length})</div>
                    {t.videos.slice(0,8).map(v => {const ch=getChannel(data,v.channel_id);return(
                      <div key={v.id} onClick={()=>onVideo(v)} style={{padding:'6px 10px',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'6px',marginBottom:'4px',cursor:'pointer',display:'flex',alignItems:'center',gap:'8px'}}>
                        <span className="channel-dot" style={{background:ch?.color}}></span>
                        <span style={{flex:1,fontSize:'12px',color:'var(--text-2)'}}>{v.title}</span>
                        <span style={{fontSize:'11px',color:'var(--text-4)'}}>{timeAgo(v)}</span>
                      </div>
                    )})}
                    {t.videos.length > 8 && <div style={{fontSize:'11px',color:'var(--text-4)',marginTop:'4px'}}>+ {t.videos.length-8} more</div>}
                  </td></tr>
                )}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── TOPIC CONNECTION MATRIX VIEW ─────────────────────────────────────────────
function TopicConnectionMatrix({ data, onVideo }) {
  const [timeframe, setTimeframe] = useState(30);
  const [selectedCell, setSelectedCell] = useState(null); // "topicA|||topicB"
  const [minConnections, setMinConnections] = useState(1);
  const [copiedCell, setCopiedCell] = useState(null);

  const filtered = data.videos.filter(v => timeframe === null ? true : getDaysAgo(v) <= timeframe);

  // Build co-occurrence matrix
  const coMap = {}; // "A|||B" → { count, videos, channels }
  const topicCounts = {};
  filtered.forEach(video => {
    const ch = getChannel(data, video.channel_id);
    const topics = video.topics || [];
    topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; });
    for (let i = 0; i < topics.length; i++) {
      for (let j = i + 1; j < topics.length; j++) {
        const key = [topics[i], topics[j]].sort().join('|||');
        if (!coMap[key]) coMap[key] = { count: 0, videos: [], channels: new Set() };
        coMap[key].count++;
        coMap[key].videos.push(video);
        if (ch) coMap[key].channels.add(ch.id);
      }
    }
  });

  // Get top topics by frequency
  const topTopics = Object.entries(topicCounts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 15)
    .map(([name]) => name);

  // Build connection list (for table view below matrix)
  const connections = Object.entries(coMap)
    .map(([key, d]) => {
      const [a, b] = key.split('|||');
      return { key, topicA: a, topicB: b, count: d.count, videos: d.videos,
        channelCount: d.channels.size,
        channels: [...d.channels].map(id => getChannel(data, id)).filter(Boolean)
      };
    })
    .filter(d => d.count >= minConnections)
    .sort((a, b) => b.count - a.count);

  const maxCount = Math.max(...connections.map(d => d.count), 1);

  function getCellColor(count) {
    if (count === 0) return 'transparent';
    const intensity = Math.min(1, count / Math.max(maxCount * 0.6, 1));
    return `rgba(99, 102, 241, ${0.15 + intensity * 0.65})`;
  }

  function getCoCount(a, b) {
    const key = [a, b].sort().join('|||');
    return coMap[key]?.count || 0;
  }

  function copyForOpus(conn) {
    const lines = [
      `TOPIC CONNECTION: ${conn.topicA} × ${conn.topicB}`,
      `${conn.count} co-occurrences across ${conn.channelCount} channel${conn.channelCount !== 1 ? 's' : ''}`,
      '',
      'PROMPT: These two topics keep appearing together. Analyze why.',
      'What is the causal or strategic link? Is this a leading indicator of a larger trend?',
      'What would a PE investor or operator conclude from this co-occurrence?',
      '', 'VIDEOS:', ''
    ];
    conn.videos.forEach(v => {
      const ch = getChannel(data, v.channel_id);
      lines.push(`[${ch?.name || v.channel_id}] "${v.title}" (${timeAgo(v)})`);
      if (v.one_liner) lines.push(`  → ${v.one_liner}`);
      lines.push('');
    });
    navigator.clipboard.writeText(lines.join('\n'));
    setCopiedCell(conn.key); setTimeout(() => setCopiedCell(null), 2000);
  }

  const selConn = selectedCell ? connections.find(c => c.key === selectedCell) : null;

  return (
    <div style={{padding:'28px'}}>
      <div style={{marginBottom:'24px'}}>
        <div style={{fontSize:'22px',fontWeight:'600',color:'var(--text-1)',marginBottom:'4px'}}>⚡ Topic Connections</div>
        <div style={{fontSize:'13px',color:'var(--text-3)',lineHeight:'1.6',maxWidth:'640px'}}>
          Which topics keep showing up together — and why that matters. Brighter cells = stronger connection.

                    {conn.channels.map(ch => <span key={ch.id} className="channel-dot" style={{background:ch.color}} title={ch.name}></span>)}
                  </div>
                </td>
                <td style={{textAlign:'center'}}>
                  <button className="export-opus-btn" onClick={e => {e.stopPropagation(); copyForOpus(conn);}} style={{fontSize:'10px',padding:'2px 8px'}}>
                    {copiedCell === conn.key ? '✓' : '📋'}
                  </button>

            ))}

        {connections.length === 0 && (
          <div style={{padding:'48px',textAlign:'center',color:'var(--text-4)'}}>
            <div style={{fontSize:'32px',marginBottom:'12px'}}>⚡</div>
            <div>No topic connections found in this timeframe. Need videos with 2+ topics each.</div>

        )}
      </div>

  );
}

// ─── CONTRADICTION DETECTOR VIEW ──────────────────────────────────────────────
function ContradictionView({ data, onVideo }) {
  const [timeframe, setTimeframe] = useState(30);
  const [expandedIdx, setExpandedIdx] = useState(null);
  const [copiedIdx, setCopiedIdx] = useState(null);
  const [filterType, setFilterType] = useState('all');

  const filtered = data.videos.filter(v => timeframe === null ? true : getDaysAgo(v) <= timeframe);

  // Broad sentiment word lists — natural language, not finance jargon
  const positive = ['good','great','strong','better','best','improve','success','win','advantage','lead','growing','accelerat','promising','exciting','impressive','powerful','efficient','innovative','transform','breakthrough','enable','opportunity','upside','benefit','gain','boost','surge','momentum','bullish','optimistic','tailwind','outperform','exceed','record','remarkable','incredible'];
  const negative = ['bad','worse','worst','weak','fail','risk','threat','lose','losing','struggle','slow','decline','drop','fall','concern','problem','challenge','difficult','expensive','costly','overvalued','bubble','crash','behind','lag','miss','gap','limit','barrier','headwind','bearish','pessimistic','overhyped','overrated','unsustainable','fragile','vulnerable','danger'];
  const tension = ['but','however','yet','although','despite','disagree','wrong','actually','contrary','whereas','instead','unlike','contrast','debate','question','skeptic','doubt','uncertain','unclear','tension','conflict','paradox','ironic','surprising','unexpected','overlooked','underestimated','overestimated','misunderstood','not so sure','on the other hand'];

  function detectTone(text) {
    if (!text) return { pos: 0, neg: 0, ten: 0, label: 'neutral' };
    const lower = text.toLowerCase();
    let pos = 0, neg = 0, ten = 0;
    positive.forEach(w => { if (lower.includes(w)) pos++; });
    negative.forEach(w => { if (lower.includes(w)) neg++; });
    tension.forEach(w => { if (lower.includes(w)) ten++; });
    let label = 'neutral';
    if (pos > neg + 1) label = 'positive';
    else if (neg > pos + 1) label = 'negative';
    else if (pos > 0 && neg > 0) label = 'mixed';
    return { pos, neg, ten, label };
  }

  // ── APPROACH: Three layers of tension detection ──
  // Layer 1: Fuzzy topic matching (shared words merge topics)
  // Layer 2: Content cross-references (topic A's content mentions topic B's keywords)
  // Layer 3: Per-video cross-channel comparison (same video topics = different channels weighing in)

  const stopWords = new Set(['the','a','an','and','or','of','in','on','at','to','for','is','it','by','with','as','vs','from','how','why','what','new','this','that','its']);
  function topicWords(t) {
    return t.toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/).filter(w => w.length > 2 && !stopWords.has(w));
  }
  function topicsRelated(a, b) {
    if (a === b) return true;
    const wa = topicWords(a), wb = topicWords(b);
    // Direct word overlap
    const shared = wa.filter(w => wb.some(w2 => w2 === w || w2.includes(w) || w.includes(w2)));
    return shared.length > 0;
  }

  // Layer 1: Build topic groups from fuzzy word matching
  const allTopics = [...new Set(filtered.flatMap(v => v.topics || []))];
  const topicGroups = [];
  allTopics.forEach(t => {
    const existing = topicGroups.find(g => [...g.topics].some(gt => topicsRelated(gt, t)));
    if (existing) { existing.topics.add(t); }
    else { topicGroups.push({ topics: new Set([t]) }); }
  });
  topicGroups.forEach(g => { g.label = [...g.topics].sort((a,b) => a.length - b.length)[0]; });

  // Layer 2: Content cross-referencing — if video A's insights mention keywords from topic B, link them
  filtered.forEach(video => {
    const content = [...(video.host_takes||[]), ...(video.key_insights||[]), video.summary||'', video.one_liner||''].join(' ').toLowerCase();
    allTopics.forEach(topic => {
      if ((video.topics || []).includes(topic)) return; // already tagged
      const words = topicWords(topic);
      if (words.length === 0) return;
      const matches = words.filter(w => content.includes(w));
      if (matches.length >= Math.max(1, Math.ceil(words.length * 0.6))) {
        // Content mentions this topic — merge groups
        const videoGroup = topicGroups.find(g => (video.topics||[]).some(vt => g.topics.has(vt)));
        const topicGroup = topicGroups.find(g => g.topics.has(topic));
        if (videoGroup && topicGroup && videoGroup !== topicGroup) {
          [...topicGroup.topics].forEach(t => videoGroup.topics.add(t));
          topicGroup.topics = videoGroup.topics; // point to same set
          topicGroup.label = videoGroup.label;
        }
      }
    });
  });
  // Deduplicate groups (some now share the same Set reference)
  const seenSets = new Set();
  const dedupedGroups = topicGroups.filter(g => {
    const key = [...g.topics].sort().join('|||');
    if (seenSets.has(key)) return false;
    seenSets.add(key);
    return true;
  });
  dedupedGroups.forEach(g => { g.label = [...g.topics].sort((a,b) => a.length - b.length)[0]; });

  // Build per-group, per-channel map
  const topicChannels = {};
  filtered.forEach(video => {
    const ch = getChannel(data, video.channel_id);
    const chName = ch?.name || video.channel_id;

    (video.topics || []).forEach(topic => {
      const group = dedupedGroups.find(g => g.topics.has(topic));
      const groupLabel = group ? group.label : topic;

      if (!topicChannels[groupLabel]) topicChannels[groupLabel] = { allTopics: new Set(), channels: {} };
      topicChannels[groupLabel].allTopics.add(topic);
      const channels = topicChannels[groupLabel].channels;

      if (!channels[chName]) channels[chName] = { videos: [], takes: [], insights: [], summaries: [], channel: ch };
      const entry = channels[chName];
      if (!entry.videos.find(v => v.id === video.id)) {
        entry.videos.push(video);
        (video.host_takes || []).forEach(t => entry.takes.push(t));
        (video.key_insights || []).forEach(i => entry.insights.push(i));
        entry.summaries.push(video.one_liner || video.full_summary || video.summary || '');
      }
    });
  });

  // ── Layer 3: Video-vs-video content similarity (catches what topic matching misses) ──
  const videoContentCache = {};
  filtered.forEach(v => {
    const words = new Set(
      [...(v.host_takes||[]), ...(v.key_insights||[]), v.summary||'', v.one_liner||'']
        .join(' ').toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/)
        .filter(w => w.length > 2 && !stopWords.has(w))
    );
    videoContentCache[v.id] = { video: v, words, channel: getChannel(data, v.channel_id) };
  });

  // Compare videos across channels
  const videoIds = Object.keys(videoContentCache);
  for (let i = 0; i < videoIds.length; i++) {
    for (let j = i + 1; j < videoIds.length; j++) {
      const a = videoContentCache[videoIds[i]], b = videoContentCache[videoIds[j]];
      if (a.video.channel_id === b.video.channel_id) continue;
      const shared = [...a.words].filter(w => b.words.has(w));
      const minSize = Math.min(a.words.size, b.words.size);
      const ratio = minSize > 0 ? shared.length / minSize : 0;
      if (shared.length < 2 && ratio < 0.04) continue; // need 2+ shared words or 4%+ overlap

      // Create a synthetic topic group from this pair
      const topicLabel = shared.slice(0, 3).join(' + ');
      const chNameA = a.channel?.name || a.video.channel_id;
      const chNameB = b.channel?.name || b.video.channel_id;

      // Check if these specific videos are already in a group together
      const alreadyCovered = Object.values(topicChannels).some(g => {
        const chs = g.channels;
        const chA = chs[chNameA], chB = chs[chNameB];
        if (!chA || !chB) return false;
        return chA.videos.some(v => v.id === a.video.id) && chB.videos.some(v => v.id === b.video.id);
      });
      if (alreadyCovered) continue;

      // Build synthetic group
      const aTopics = (a.video.topics||[]).join(', ');
      const bTopics = (b.video.topics||[]).join(', ');
      const syntheticLabel = `Cross-ref: ${a.video.topics?.[0] || 'unknown'} × ${b.video.topics?.[0] || 'unknown'}`;

      if (!topicChannels[syntheticLabel]) topicChannels[syntheticLabel] = { allTopics: new Set(), channels: {}, synthetic: true };
      topicChannels[syntheticLabel].allTopics.add(aTopics);
      topicChannels[syntheticLabel].allTopics.add(bTopics);
      const channels = topicChannels[syntheticLabel].channels;

      if (!channels[chNameA]) channels[chNameA] = { videos: [], takes: [], insights: [], summaries: [], channel: a.channel };
      const entryA = channels[chNameA];
      if (!entryA.videos.find(v => v.id === a.video.id)) {
        entryA.videos.push(a.video);
        (a.video.host_takes||[]).forEach(t => entryA.takes.push(t));
        (a.video.key_insights||[]).forEach(k => entryA.insights.push(k));
        entryA.summaries.push(a.video.one_liner || a.video.summary || '');
      }

      if (!channels[chNameB]) channels[chNameB] = { videos: [], takes: [], insights: [], summaries: [], channel: b.channel };
      const entryB = channels[chNameB];
      if (!entryB.videos.find(v => v.id === b.video.id)) {
        entryB.videos.push(b.video);
        (b.video.host_takes||[]).forEach(t => entryB.takes.push(t));
        (b.video.key_insights||[]).forEach(k => entryB.insights.push(k));
        entryB.summaries.push(b.video.one_liner || b.video.summary || '');
      }
    }
  }

  // Find all multi-channel topics and classify the tension
  const tensions = [];
  Object.entries(topicChannels).forEach(([topic, groupData]) => {
    const channels = groupData.channels;
    const chEntries = Object.entries(channels);
    if (chEntries.length < 2) return;
    const relatedTopics = [...(groupData.allTopics || [])].join(', ');

    // Analyze tone per channel
    const channelTones = chEntries.map(([chName, d]) => {
      const allText = [...d.takes, ...d.insights, ...d.summaries].join(' ');
      const tone = detectTone(allText);
      return { chName, ...d, tone, allText };
    });

    // Generate pairs
    for (let i = 0; i < channelTones.length; i++) {
      for (let j = i + 1; j < channelTones.length; j++) {
        const a = channelTones[i], b = channelTones[j];
        const contentA = [...a.takes, ...a.insights].filter(Boolean);
        const contentB = [...b.takes, ...b.insights].filter(Boolean);

        // Skip if either side has zero content
        if (contentA.length === 0 && a.summaries.every(s => !s)) continue;
        if (contentB.length === 0 && b.summaries.every(s => !s)) continue;

        // Classify tension type
        let type = 'multi-view'; // default: same topic, different sources
        let strength = chEntries.length + contentA.length + contentB.length;

        const opposing = (a.tone.label === 'positive' && b.tone.label === 'negative') ||
                         (a.tone.label === 'negative' && b.tone.label === 'positive');
        const hasTension = a.tone.ten > 1 || b.tone.ten > 1;
        const tonesDiffer = a.tone.label !== b.tone.label && a.tone.label !== 'neutral' && b.tone.label !== 'neutral';

        if (opposing) { type = 'opposing'; strength += 10; }
        else if (tonesDiffer) { type = 'divergent'; strength += 5; }
        else if (hasTension) { type = 'tension'; strength += 3; }

        tensions.push({
          topic, relatedTopics,
          channelA: a.chName, toneA: a.tone, colorA: a.channel?.color,
          videosA: a.videos, takesA: contentA.length > 0 ? contentA : a.summaries.filter(Boolean),
          channelB: b.chName, toneB: b.tone, colorB: b.channel?.color,
          videosB: b.videos, takesB: contentB.length > 0 ? contentB : b.summaries.filter(Boolean),
          type, strength, channelCount: chEntries.length
        });
      }
    }
  });

  tensions.sort((a, b) => b.strength - a.strength);

  const filteredTensions = filterType === 'all' ? tensions : tensions.filter(t => t.type === filterType);

  const typeCounts = { all: tensions.length, opposing: 0, divergent: 0, tension: 0, 'multi-view': 0 };
  tensions.forEach(t => typeCounts[t.type]++);

  function copyForOpus(c, idx) {
    const lines = [
      `CROSS-CHANNEL TENSION: ${c.topic}`,
      `${c.channelA} (${c.toneA.label}) vs ${c.channelB} (${c.toneB.label})`,
      `Tension type: ${c.type} | Channels covering this topic: ${c.channelCount}`, '',
      'PROMPT: Two credible sources cover the same topic from different angles.',
      'Analyze both positions carefully:',
      '1. What is each source really saying? Steel-man both sides.',
      '2. Where specifically do they diverge — on facts, interpretation, or emphasis?',
      '3. Who has the stronger case and why?',
      '4. What data or evidence would definitively resolve the disagreement?',
      '5. What is each side missing or underweighting?',
      '6. If you had to pick a side, which one and at what confidence level?',
      '', `── ${c.channelA} ──`
    ];
    c.takesA.slice(0, 8).forEach(t => lines.push(`  • ${t}`));
    lines.push('', `── ${c.channelB} ──`);
    c.takesB.slice(0, 8).forEach(t => lines.push(`  • ${t}`));
    lines.push('', 'VIDEOS:');
    [...c.videosA, ...c.videosB].forEach(v => lines.push(`  [${getChannel(data, v.channel_id)?.name}] "${v.title}" (${timeAgo(v)})`));
    navigator.clipboard.writeText(lines.join('\n'));
    setCopiedIdx(idx); setTimeout(() => setCopiedIdx(null), 2000);
  }

  const typeConfig = {
    opposing: { icon: '⚔️', label: 'OPPOSING', color: '#ef4444', bg: 'rgba(239,68,68,0.1)' },
    divergent: { icon: '↔️', label: 'DIVERGENT', color: '#f59e0b', bg: 'rgba(245,158,11,0.1)' },
    tension: { icon: '⚡', label: 'TENSION', color: '#8b5cf6', bg: 'rgba(139,92,246,0.1)' },
    'multi-view': { icon: '👁️', label: 'MULTI-VIEW', color: '#06418C', bg: 'rgba(6,65,140,0.1)' }
  };
  const toneColors = { positive: '#10b981', negative: '#ef4444', mixed: '#f59e0b', neutral: '#6B7280' };
  const toneIcons = { positive: '↑', negative: '↓', mixed: '↕', neutral: '—' };

  return (
    <div style={{padding:'28px'}}>
      <div style={{marginBottom:'24px'}}>
        <div style={{fontSize:'22px',fontWeight:'600',color:'var(--text-1)',marginBottom:'4px'}}>🔥 Contradiction Detector</div>
        <div style={{fontSize:'13px',color:'var(--text-3)',lineHeight:'1.6',maxWidth:'640px'}}>
          Where your sources see the same topic differently. Opposing tones, divergent takes,
          and multi-channel perspectives — ranked by tension strength. Click any row to compare the evidence.
        </div>
      </div>

      {/* Stats bar */}
      <div style={{display:'flex',gap:'16px',marginBottom:'20px',flexWrap:'wrap'}}>
        {[
          { label: 'Opposing', count: typeCounts.opposing, color: '#ef4444', icon: '⚔️' },
          { label: 'Divergent', count: typeCounts.divergent, color: '#f59e0b', icon: '↔️' },
