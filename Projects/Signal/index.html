// ─── WEEKLY DIFF VIEW ─────────────────────────────────────────────────────────
function WeeklyDiffView({ data, onVideo }) {
  const now = Date.now();
  const day = 86400000;

  // This week = last 7 days, prior week = 7-14 days ago
  const thisWeek = data.videos.filter(v => getDaysAgo(v) <= 7);
  const lastWeek = data.videos.filter(v => getDaysAgo(v) > 7 && getDaysAgo(v) <= 14);

  function buildTopicMap(videos) {
    const map = {};
    videos.forEach(v => {
      const ch = getChannel(data, v.channel_id);
      (v.topics || []).forEach(t => {
        if (!map[t]) map[t] = { count: 0, channels: new Set(), videos: [] };
        map[t].count++;
        map[t].channels.add(ch?.name || v.channel_id);
        map[t].videos.push(v);
      });
    });
    return map;
  }

  const thisMap = buildTopicMap(thisWeek);
  const lastMap = buildTopicMap(lastWeek);
  const allTopics = [...new Set([...Object.keys(thisMap), ...Object.keys(lastMap)])];

  const diffs = allTopics.map(topic => {
    const thisCount = thisMap[topic]?.count || 0;
    const lastCount = lastMap[topic]?.count || 0;
    const delta = thisCount - lastCount;
    const isNew = thisCount > 0 && lastCount === 0;
    const isGone = thisCount === 0 && lastCount > 0;
    const isSurge = delta >= 2 && thisCount >= 3;
    const isDrop = delta <= -2;
    return {
      topic, thisCount, lastCount, delta, isNew, isGone, isSurge, isDrop,
      channels: thisMap[topic]?.channels || lastMap[topic]?.channels || new Set(),
      videos: thisMap[topic]?.videos || []
    };
  }).filter(d => d.delta !== 0 || d.isNew || d.isGone)
    .sort((a, b) => Math.abs(b.delta) - Math.abs(a.delta));

  const newTopics = diffs.filter(d => d.isNew);
  const goneTopics = diffs.filter(d => d.isGone);
  const surges = diffs.filter(d => d.isSurge && !d.isNew);
  const drops = diffs.filter(d => d.isDrop && !d.isGone);
  const movers = diffs.filter(d => !d.isNew && !d.isGone && !d.isSurge && !d.isDrop && d.delta !== 0);

  function DiffSection({ title, icon, items, color, emptyMsg }) {
    if (items.length === 0) return null;
    return (
      <div style={{marginBottom:'20px'}}>
        <div style={{fontSize:'12px',fontWeight:'600',color,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'8px',display:'flex',alignItems:'center',gap:'6px'}}>
          <span>{icon}</span> {title}
        </div>
        {items.map(d => (
          <div key={d.topic} className="card" style={{padding:'12px 16px',marginBottom:'6px',borderLeft:`3px solid ${color}`}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <span style={{fontWeight:'600',color:'var(--text-1)',fontSize:'14px'}}>{d.topic}</span>
                <span style={{fontSize:'11px',color:'var(--text-4)'}}>
                  {d.isNew ? 'NEW' : d.isGone ? `was ${d.lastCount}` : `${d.lastCount} → ${d.thisCount}`}
                </span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                {!d.isGone && <span style={{fontWeight:'700',fontSize:'14px',color}}>{d.delta > 0 ? '+' : ''}{d.delta}</span>}
                <div style={{display:'flex',gap:'2px'}}>
                  {[...d.channels].slice(0,3).map(ch => (
                    <span key={ch} style={{fontSize:'10px',color:'var(--text-4)',background:'var(--bg-hover)',padding:'1px 6px',borderRadius:'8px'}}>{ch}</span>
                  ))}
                </div>
              </div>
            </div>
            {d.videos.length > 0 && (
              <div style={{marginTop:'8px',display:'flex',gap:'4px',flexWrap:'wrap'}}>
                {d.videos.slice(0,3).map(v => (
                  <span key={v.id} onClick={() => onVideo(v)} style={{fontSize:'10px',color:'var(--text-3)',cursor:'pointer',background:'var(--bg)',padding:'2px 8px',borderRadius:'6px',border:'1px solid var(--border)'}}>
                    {v.title.length > 40 ? v.title.slice(0,38) + '…' : v.title}
                  </span>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    );
  }

  return (
    <div style={{padding:'28px'}}>
      <div style={{marginBottom:'24px'}}>
        <div style={{fontSize:'22px',fontWeight:'600',color:'var(--text-1)',marginBottom:'4px'}}>📈 Weekly Diff</div>
        <div style={{fontSize:'13px',color:'var(--text-3)',lineHeight:'1.6',maxWidth:'640px'}}>
          What changed in the last 7 days vs. the prior 7. New topics, disappeared topics,
          and shifts in frequency — the signal beneath the noise.
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(120px, 1fr))',gap:'10px',marginBottom:'24px'}}>
        <div className="card" style={{padding:'14px',textAlign:'center'}}>
          <div style={{fontSize:'24px',fontWeight:'700',color:'#6366f1'}}>{thisWeek.length}</div>
          <div style={{fontSize:'11px',color:'var(--text-4)'}}>Videos this week</div>
        </div>
        <div className="card" style={{padding:'14px',textAlign:'center'}}>
          <div style={{fontSize:'24px',fontWeight:'700',color:'var(--text-3)'}}>{lastWeek.length}</div>
          <div style={{fontSize:'11px',color:'var(--text-4)'}}>Videos last week</div>
        </div>
        <div className="card" style={{padding:'14px',textAlign:'center'}}>
          <div style={{fontSize:'24px',fontWeight:'700',color:'#10b981'}}>{newTopics.length}</div>
          <div style={{fontSize:'11px',color:'var(--text-4)'}}>New topics</div>
        </div>
        <div className="card" style={{padding:'14px',textAlign:'center'}}>
          <div style={{fontSize:'24px',fontWeight:'700',color:'#ef4444'}}>{goneTopics.length}</div>
          <div style={{fontSize:'11px',color:'var(--text-4)'}}>Dropped off</div>
        </div>
      </div>

      {diffs.length === 0 ? (
        <div className="card" style={{padding:'48px',textAlign:'center',color:'var(--text-4)'}}>
          <div style={{fontSize:'32px',marginBottom:'12px'}}>📈</div>
          <div>No changes detected between this week and last week.</div>
          <div style={{fontSize:'12px',marginTop:'8px'}}>Need videos in both the last 7 and prior 7 days to compare.</div>
        </div>
      ) : (
        <div>
          <DiffSection title="New This Week" icon="🟢" items={newTopics} color="#10b981" />
          <DiffSection title="Surging" icon="🔥" items={surges} color="#f59e0b" />
          <DiffSection title="Dropping" icon="📉" items={drops} color="#ef4444" />
          <DiffSection title="Disappeared" icon="💨" items={goneTopics} color="#6e7681" />
          <DiffSection title="Shifted" icon="↕️" items={movers} color="#6366f1" />
        </div>
      )}
    </div>
  );
}

// ─── THESIS BUILDER VIEW ──────────────────────────────────────────────────────
function ThesisBuilderView({ data, onVideo }) {
  const [timeframe, setTimeframe] = useState(14);
  const [selectedThesis, setSelectedThesis] = useState(null);
  const [copiedIdx, setCopiedIdx] = useState(null);

  const filtered = data.videos.filter(v => timeframe === null ? true : getDaysAgo(v) <= timeframe);

  // Build topic clusters — groups of topics that frequently co-occur
  const coMap = {};
  const topicVideos = {};
  filtered.forEach(video => {
    const topics = video.topics || [];
    topics.forEach(t => {
      if (!topicVideos[t]) topicVideos[t] = [];
      topicVideos[t].push(video);
    });
    for (let i = 0; i < topics.length; i++) {
      for (let j = i + 1; j < topics.length; j++) {
        const key = [topics[i], topics[j]].sort().join('|||');
        coMap[key] = (coMap[key] || 0) + 1;
      }
    }
  });

  // Find topic clusters via greedy grouping
  const topTopics = Object.entries(topicVideos)
    .sort((a, b) => b[1].length - a[1].length)
    .slice(0, 20)
    .map(([name]) => name);

  const used = new Set();
  const clusters = [];

  topTopics.forEach(seed => {
    if (used.has(seed)) return;
    const cluster = [seed];
    used.add(seed);

    // Find strongly connected topics
    topTopics.forEach(other => {
      if (used.has(other)) return;
      const key = [seed, other].sort().join('|||');
      if ((coMap[key] || 0) >= 2) {
        cluster.push(other);
        used.add(other);
      }
    });

    if (cluster.length >= 2) {
      // Gather all videos touching any topic in this cluster
      const clusterVideos = [...new Set(cluster.flatMap(t => topicVideos[t] || []))];
      const channels = [...new Set(clusterVideos.map(v => {
        const ch = getChannel(data, v.channel_id);
        return ch?.name || v.channel_id;
      }))];

      // Extract key data points
      const kpis = clusterVideos.flatMap(v => (v.kpi_table || []).map(k => ({ ...k, video: v })));
      const takes = clusterVideos.flatMap(v => (v.host_takes || []).map(t => ({ text: t, video: v })));
      const predictions = clusterVideos.flatMap(v => (v.predictions || []).map(p => ({ text: p, video: v })));
      const insights = clusterVideos.flatMap(v => (v.key_insights || []).map(i => ({ text: i, video: v })));

      // Auto-generate thesis name from topic combination
      const thesisName = cluster.length <= 3 ? cluster.join(' + ') : cluster.slice(0,2).join(' + ') + ` +${cluster.length-2}`;

      clusters.push({
        name: thesisName, topics: cluster, videos: clusterVideos, channels,
        kpis: kpis.slice(0, 8), takes: takes.slice(0, 6), predictions: predictions.slice(0, 4), insights: insights.slice(0, 6),
        strength: clusterVideos.length
      });
    }
  });

  clusters.sort((a, b) => b.strength - a.strength);

  function copyForOpus(c, idx) {
    const lines = [
      `THESIS: ${c.name}`,
      `Topics: ${c.topics.join(', ')}`,
      `${c.videos.length} videos across ${c.channels.length} channels (${c.channels.join(', ')})`,
      '',
      'PROMPT: The following data points, takes, and predictions cluster around a connected thesis.',
      'Synthesize them into a single sharp investment or strategic thesis.',
      'Structure: (1) The thesis in one sentence. (2) The 3 strongest supporting data points.',
      '(3) The biggest risk to this thesis. (4) What would change your mind.',
      '(5) If this thesis is right, name 3 specific actions a CEO/investor should take this quarter.',
      ''
    ];
    if (c.kpis.length > 0) {
      lines.push('── KEY DATA ──');
      c.kpis.forEach(k => lines.push(`  ${k.kpi}: ${k.value} — ${k.context}`));
      lines.push('');
    }
    if (c.takes.length > 0) {
      lines.push('── HOST TAKES ──');
      c.takes.forEach(t => lines.push(`  • ${t.text}`));
      lines.push('');
    }
    if (c.predictions.length > 0) {
      lines.push('── PREDICTIONS ──');
      c.predictions.forEach(p => lines.push(`  • ${p.text}`));
      lines.push('');
    }
    if (c.insights.length > 0) {
      lines.push('── KEY INSIGHTS ──');
      c.insights.forEach(i => lines.push(`  • ${i.text}`));
      lines.push('');
    }
    lines.push('── VIDEOS ──');
    c.videos.forEach(v => {
      const ch = getChannel(data, v.channel_id);
      lines.push(`  [${ch?.name}] "${v.title}" (${timeAgo(v)})`);
    });
    navigator.clipboard.writeText(lines.join('\n'));
    setCopiedIdx(idx); setTimeout(() => setCopiedIdx(null), 2000);
  }

  return (
    <div style={{padding:'28px'}}>
      <div style={{marginBottom:'24px'}}>
        <div style={{fontSize:'22px',fontWeight:'600',color:'var(--text-1)',marginBottom:'4px'}}>🎯 Thesis Builder</div>
        <div style={{fontSize:'13px',color:'var(--text-3)',lineHeight:'1.6',maxWidth:'640px'}}>
          Auto-detected topic clusters that form investable theses. Topics that keep appearing together
          across channels suggest a connected narrative. Click to explore, copy to Opus to sharpen into
          a real thesis.
        </div>
      </div>

      <div style={{display:'flex',gap:'8px',marginBottom:'24px'}}>
        {[{l:'7d',v:7},{l:'14d',v:14},{l:'30d',v:30},{l:'All',v:null}].map(o => (
          <button key={o.l} className={`filter-pill ${timeframe===o.v?'active':''}`} onClick={() => setTimeframe(o.v)}>{o.l}</button>
        ))}
      </div>

      {clusters.length === 0 ? (
        <div className="card" style={{padding:'48px',textAlign:'center',color:'var(--text-4)'}}>
          <div style={{fontSize:'32px',marginBottom:'12px'}}>🎯</div>
          <div>No topic clusters detected. Need more videos with overlapping topics.</div>
        </div>
      ) : clusters.map((c, idx) => (
        <div key={idx} className="card" style={{padding:'0',marginBottom:'12px',overflow:'hidden',
          borderLeft: selectedThesis === idx ? '3px solid #6366f1' : '3px solid transparent'}}>
          <div onClick={() => setSelectedThesis(selectedThesis === idx ? null : idx)}
            style={{padding:'16px 20px',cursor:'pointer',transition:'background 0.15s',
              background: selectedThesis === idx ? 'var(--bg-hover)' : 'transparent'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                <span style={{fontSize:'16px',fontWeight:'700',color:'var(--text-1)'}}>{c.name}</span>
                <span className="badge-count">{c.videos.length} videos</span>
                <span className="badge-count" style={{background:'rgba(99,102,241,0.1)',color:'#6366f1'}}>{c.channels.length} channels</span>
              </div>
              <button className="export-opus-btn" onClick={e => {e.stopPropagation(); copyForOpus(c, idx);}} style={{fontSize:'11px',padding:'4px 12px'}}>
                {copiedIdx === idx ? '✓ Copied' : '📋 Build Thesis in Opus'}
              </button>
            </div>
            <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
              {c.topics.map(t => (
                <span key={t} className="tag" style={{fontSize:'11px'}}>{t}</span>
              ))}
            </div>
          </div>

          {selectedThesis === idx && (
            <div style={{padding:'0 20px 20px',borderTop:'1px solid var(--border)'}}>
              {c.kpis.length > 0 && (
                <div style={{marginTop:'14px'}}>
                  <div style={{fontSize:'11px',fontWeight:'600',color:'var(--text-4)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:'8px'}}>Key Data</div>

                  </div>
                );})}
                {c.videos.length > 6 && <div style={{fontSize:'11px',color:'var(--text-4)',marginTop:'4px'}}>+ {c.videos.length-6} more</div>}
              </div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function QuoteBankView({ data, onVideo }) {

  const allDataPoints = data.videos.flatMap(v => {

      id: `${v.id}-kpi${idx}`, type: 'kpi', metric: row.kpi, value: row.value, context: row.context,

    }));
    const figs = (v.figures_and_data || []).map((fig, idx) => ({

  // Aggregate quotes (secondary tab)

// ─── TIME MACHINE VIEW ───────────────────────────────────────────────────────
function TimeMachineView({ data, onVideo }) {
  const [timeframe, setTimeframe] = useState(8);
  const [expandedTopic, setExpandedTopic] = useState(null);
  const [drillTopic, setDrillTopic] = useState(null); // sub-topic drill
  const [hoveredBar, setHoveredBar] = useState(null);

  const weekBuckets = {};
  data.videos.forEach(v => {
    const w = Math.floor(getDaysAgo(v) / 7);
    if (w < timeframe) { if (!weekBuckets[w]) weekBuckets[w] = []; weekBuckets[w].push(v); }
  });

  const topicWeekCounts = {};
  Object.entries(weekBuckets).forEach(([week, vids]) => {
    vids.forEach(v => (v.topics||[]).forEach(topic => {
      if (!topicWeekCounts[topic]) topicWeekCounts[topic] = {};
      topicWeekCounts[topic][week] = (topicWeekCounts[topic][week] || 0) + 1;
    }));
  });

  // Build parent/child hierarchy: detect broad topics and their sub-topics
  const topicNames = Object.keys(topicWeekCounts);
  const parentChildren = {};
  topicNames.forEach(name => {
    const lName = name.toLowerCase();
    topicNames.forEach(other => {
      if (other === name) return;
      const lOther = other.toLowerCase();
      // "AI Talent War" is child of "AI" if "AI" appears as a word boundary in the longer topic
      if (lOther.length > lName.length && lOther.includes(lName) && lName.length >= 2) {
        // Ensure it's a word boundary match
        const idx = lOther.indexOf(lName);
        const before = idx === 0 || lOther[idx-1] === ' ';
        const after = idx + lName.length >= lOther.length || lOther[idx + lName.length] === ' ';
        if (before && after) {
          if (!parentChildren[name]) parentChildren[name] = [];
          parentChildren[name].push(other);
        }
      }
    });
  });

  const topicsWithCounts = Object.entries(topicWeekCounts).map(([topic, weeks]) => {
    const total = Object.values(weeks).reduce((a,b) => a+b, 0);
    const recentCount = (weeks[0]||0) + (weeks[1]||0);
    const priorEntries = Object.entries(weeks).filter(([w]) => parseInt(w) > 1);
    const priorAvg = priorEntries.length > 0 ? priorEntries.reduce((s,[,c])=>s+c,0)/priorEntries.length : 0;
    const children = parentChildren[topic] || [];
    return { topic, weeks, total, recentCount, priorAvg, children };
  }).sort((a,b) => b.total - a.total).slice(0,25);

  const maxCount = Math.max(...topicsWithCounts.map(t => Math.max(...Object.values(t.weeks))), 1);
  const getWeekLabel = w => w===0 ? 'This week' : w===1 ? '1w ago' : `${w}w ago`;
  const getTrend = t => { if (t.priorAvg===0 && t.recentCount > 0) return 'HOT'; if (t.recentCount > t.priorAvg*1.2) return 'HOT'; if (t.recentCount < t.priorAvg*0.8 && t.priorAvg > 0) return 'COLD'; return null; };

  // Sub-topic drill data
  const drillData = drillTopic ? (parentChildren[drillTopic] || []).map(child => {
    const weeks = topicWeekCounts[child] || {};
    const total = Object.values(weeks).reduce((a,b)=>a+b,0);
    const recentCount = (weeks[0]||0)+(weeks[1]||0);
    const priorEntries = Object.entries(weeks).filter(([w])=>parseInt(w)>1);
    const priorAvg = priorEntries.length>0 ? priorEntries.reduce((s,[,c])=>s+c,0)/priorEntries.length : 0;
    return { topic: child, weeks, total, recentCount, priorAvg, children: [] };
  }).sort((a,b) => b.total - a.total) : [];

  const drillMax = drillData.length > 0 ? Math.max(...drillData.map(t => Math.max(...Object.values(t.weeks),0)),1) : 1;

  function TopicRow({ t, mxCount, indent }) {
    const trend = getTrend(t);
    const isExp = expandedTopic === t.topic;
    const hasSubs = t.children.length > 0;
    return (
      <div>
        <div className="tm-row" style={{cursor:'pointer',paddingLeft:indent?'20px':undefined}} onClick={()=>setExpandedTopic(isExp?null:t.topic)}>
          <div style={{width:'140px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:'13px',fontWeight:'500',color:'var(--text-1)',display:'flex',alignItems:'center',gap:'6px'}}>
            {t.topic}
            {hasSubs && <span onClick={e=>{e.stopPropagation();setDrillTopic(drillTopic===t.topic?null:t.topic);}} style={{fontSize:'10px',color:'#06b6d4',background:'#06b6d415',border:'1px solid #06b6d440',borderRadius:'4px',padding:'1px 5px',cursor:'pointer',whiteSpace:'nowrap'}} title="Drill into sub-topics">
              {t.children.length} sub ▸
            </span>}
          </div>
          <div style={{width:'32px',textAlign:'center',fontSize:'12px',color:'var(--text-3)',background:'var(--bg-hover)',borderRadius:'4px',padding:'1px 4px'}}>{t.total}</div>
          <div className="tm-bars" style={{flex:1}}>
            {Array.from({length:Math.min(timeframe,8)}).map((_,wk) => {
              const c = t.weeks[wk]||0;
              const h = Math.max(2, (c/mxCount)*28);
              return (
                <div key={wk} className="tm-bar" style={{flex:1,height:`${h}px`,background:indent?'#8b5cf6':'#06b6d4',opacity:Math.max(0.2,c/mxCount),position:'relative'}}
                  onMouseEnter={()=>setHoveredBar(`${t.topic}-${wk}`)} onMouseLeave={()=>setHoveredBar(null)}>
                  {hoveredBar===`${t.topic}-${wk}` && (
                    <div style={{position:'absolute',bottom:'100%',left:'50%',transform:'translateX(-50%)',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'4px',padding:'3px 8px',fontSize:'10px',color:'var(--text-2)',whiteSpace:'nowrap',marginBottom:'4px',zIndex:10}}>
                      {getWeekLabel(wk)}: {c}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{width:'45px',textAlign:'center'}}>
            {trend === 'HOT' && <span className="tm-trend-hot">🔥 HOT</span>}
            {trend === 'COLD' && <span className="tm-trend-cold">↓ COLD</span>}
          </div>
        </div>
        {isExp && (
          <div style={{marginLeft:'20px',marginBottom:'12px',paddingLeft:'12px',borderLeft:'2px solid var(--border-med)'}}>
            {Array.from({length:Math.min(timeframe,8)}).map((_,wk) => {
              const wkVids = (weekBuckets[wk]||[]).filter(v=>(v.topics||[]).includes(t.topic));
              if (wkVids.length===0) return null;
              return (
                <div key={wk} style={{marginBottom:'10px'}}>
                  <div style={{fontSize:'11px',color:'var(--text-4)',fontWeight:'600',marginBottom:'6px'}}>{getWeekLabel(wk)}</div>
                  {wkVids.map(v => {const ch=getChannel(data,v.channel_id);return(
                    <div key={v.id} onClick={()=>onVideo(v)} style={{padding:'6px 10px',background:'var(--bg-hover)',borderRadius:'4px',marginBottom:'4px',cursor:'pointer',fontSize:'12px'}}>
                      <span style={{color:'var(--text-2)'}}>{v.title}</span>
                      <span style={{color:'var(--text-4)',marginLeft:'8px'}}>{ch?.name} · {timeAgo(v)}</span>
                    </div>
                  )})}
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  return (
    <div style={{padding:'28px',maxWidth:'900px'}}>
      <div style={{marginBottom:'24px'}}>
        <div style={{fontSize:'22px',fontWeight:'600',color:'var(--text-1)',marginBottom:'4px'}}>⏰ Time Machine</div>
        <div style={{fontSize:'13px',color:'var(--text-3)'}}>How topics evolve across your network — click "sub" to drill into specifics</div>
      </div>
      <div style={{display:'flex',gap:'8px',marginBottom:'24px'}}>
        {[4,8,12].map(w => (
          <button key={w} className={`filter-pill ${timeframe===w?'active':''}`} onClick={()=>setTimeframe(w)}>{w} weeks</button>
        ))}
      </div>
      {topicsWithCounts.length === 0 ? (
        <div className="card" style={{padding:'48px',textAlign:'center',color:'var(--text-4)'}}>
          <div style={{fontSize:'32px',marginBottom:'12px'}}>⏰</div>
          <div>No topic data yet. Run ingest.py to load videos.</div>
        </div>
      ) : (
        <div>
          <div style={{display:'flex',gap:'12px',marginBottom:'8px',paddingLeft:'190px'}}>
            {Array.from({length:Math.min(timeframe,8)}).map((_,i) => (
              <div key={i} style={{flex:1,textAlign:'center',fontSize:'10px',color:'var(--text-5)',minWidth:'16px'}}>{getWeekLabel(i)}</div>
            ))}
            <div style={{width:'45px'}}></div>
          </div>
          {topicsWithCounts.map(t => (
            <div key={t.topic}>
              <TopicRow t={t} mxCount={maxCount} />
              {drillTopic === t.topic && drillData.length > 0 && (
                <div style={{marginLeft:'10px',marginBottom:'12px',paddingLeft:'10px',borderLeft:'3px solid #06b6d440'}}>
                  <div style={{fontSize:'11px',fontWeight:'600',color:'#06b6d4',textTransform:'uppercase',letterSpacing:'0.06em',padding:'6px 0 4px'}}>Sub-topics of "{t.topic}"</div>
                  {drillData.map(sub => <TopicRow key={sub.topic} t={sub} mxCount={drillMax} indent />)}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── SEARCH VIEW ──────────────────────────────────────────────────────────────
function SearchView({ query, data, onVideo }) {
  const results = data.videos.filter(v => {
    const q = query.toLowerCase();
    return v.title.toLowerCase().includes(q) ||
      v.summary.toLowerCase().includes(q) ||
      (v.topics || []).some(t => t.toLowerCase().includes(q)) ||
      (v.key_insights || []).some(i => i.toLowerCase().includes(q));
  });

  return (
    <div style={{padding:'28px'}}>
      <div style={{marginBottom:'20px'}}>
        <div style={{fontSize:'20px',fontWeight:'600',color:'var(--text-1)',marginBottom:'4px'}}>
          {results.length} result{results.length !== 1 ? 's' : ''} for "{query}"
        </div>
        <div style={{fontSize:'13px',color:'var(--text-3)'}}>Searched across titles, summaries, topics, and insights</div>
      </div>
      {results.length > 0 ? (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:'14px'}}>
          {results.map(v => <VideoCard key={v.id} video={v} data={data} onClick={onVideo} />)}
        </div>
      ) : (
        <div style={{textAlign:'center',padding:'60px 20px',color:'var(--text-4)'}}>
          <div style={{fontSize:'32px',marginBottom:'12px'}}>🔍</div>
          <div>No videos match "{query}"</div>
        </div>
      )}
    </div>
  );
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function Sidebar({ data, selected, onSelect, searchQuery, onSearch, isOpen, onClose, darkMode, onToggleDark }) {
  const [collapsed, setCollapsed] = useState({});
  const newCount = data.videos.filter(v => isNew(v)).length;

  function toggleCat(id) {
    setCollapsed(prev => ({ ...prev, [id]: !prev[id] }));
  }

  function countNew(channelId) {
    return data.videos.filter(v => v.channel_id === channelId && isNew(v)).length;
  }

  return (
    <nav className={`sidebar ${isOpen ? 'open' : ''}`}>
      <div style={{padding:'18px 14px 10px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:'18px',fontWeight:'700',color:'var(--text-1)',marginBottom:'2px'}}>📡 Signal</div>
          <div style={{fontSize:'11px',color:'var(--text-4)'}}>by ck</div>
        </div>
        <button className="theme-toggle" onClick={onToggleDark} title="Toggle light/dark mode">
          {darkMode ? '☀' : '🌙'}
        </button>
      </div>

      <div style={{padding:'0 10px 10px',position:'relative'}}>
        <span style={{position:'absolute',left:'20px',top:'9px',color:'var(--text-5)',fontSize:'13px'}}>⌕</span>
        <input className="search-input" type="text" placeholder="Search…"
          value={searchQuery} onChange={e => onSearch(e.target.value)} />
      </div>

      <div style={{padding:'0 10px',marginBottom:'4px'}}>
        <div className={`nav-item ${selected === 'new' ? 'active' : ''}`}
          onClick={() => { onSelect('new'); onClose(); }}>
          <span>✦</span>
          <span style={{flex:1}}>What's New</span>
          {newCount > 0 && <span className="badge-count">{newCount}</span>}
        </div>
        <div className={`nav-item ${selected === 'weekly' ? 'active' : ''}`}
          onClick={() => { onSelect('weekly'); onClose(); }}>
          <span>📰</span>
          <span style={{flex:1}}>Weekly Wrap</span>
        </div>
      </div>

      <div style={{padding:'0 10px',marginBottom:'4px'}}>
        <div style={{fontSize:'11px',fontWeight:'600',color:'var(--text-5)',textTransform:'uppercase',letterSpacing:'0.08em',padding:'8px 12px 4px'}}>Intelligence</div>
        <div className={`nav-item ${selected === 'graph' ? 'active' : ''}`}
          onClick={() => { onSelect('graph'); onClose(); }}>
          <span>🧠</span>
          <span style={{flex:1}}>Topic Intelligence</span>
        </div>
        <div className={`nav-item ${selected === 'disagree' ? 'active' : ''}`}
          onClick={() => { onSelect('disagree'); onClose(); }}>
          <span>⚡</span>
          <span style={{flex:1}}>Topic Connections</span>
        </div>
        <div className={`nav-item ${selected === 'quotes' ? 'active' : ''}`}
          onClick={() => { onSelect('quotes'); onClose(); }}>
          <span>📊</span>
          <span style={{flex:1}}>Data Vault</span>
        </div>
        <div className={`nav-item ${selected === 'timeline' ? 'active' : ''}`}
          onClick={() => { onSelect('timeline'); onClose(); }}>
          <span>⏰</span>
          <span style={{flex:1}}>Time Machine</span>
        </div>
        <div className={`nav-item ${selected === 'contradictions' ? 'active' : ''}`}
          onClick={() => { onSelect('contradictions'); onClose(); }}>
          <span>🔥</span>
          <span style={{flex:1}}>Contradictions</span>
        </div>
        <div className={`nav-item ${selected === 'diff' ? 'active' : ''}`}
          onClick={() => { onSelect('diff'); onClose(); }}>
          <span>📈</span>
          <span style={{flex:1}}>Weekly Diff</span>
        </div>
        <div className={`nav-item ${selected === 'thesis' ? 'active' : ''}`}
          onClick={() => { onSelect('thesis'); onClose(); }}>
          <span>🎯</span>
          <span style={{flex:1}}>Thesis Builder</span>
        </div>
      </div>

      <div className="divider" style={{margin:'8px 0'}} />

      <div style={{flex:1,padding:'0 10px',overflowY:'auto'}}>
        {data.categories.map(cat => (
          <div key={cat.id} style={{marginBottom:'4px'}}>
            <div className="section-header" onClick={() => toggleCat(cat.id)}>
              <span>{cat.name}</span>
              <span style={{fontSize:'10px'}}>{collapsed[cat.id] ? '▶' : '▼'}</span>
            </div>
            {!collapsed[cat.id] && cat.channels.map(ch => {
              const n = countNew(ch.id);
              return (
                <div key={ch.id} className={`channel-item ${selected === `ch:${ch.id}` ? 'active' : ''}`}
                  onClick={() => { onSelect(`ch:${ch.id}`); onClose(); }}>
                  <span className="channel-dot" style={{background:ch.color}}></span>
                  <span style={{flex:1,color: selected === `ch:${ch.id}` ? ch.color : undefined}}>{ch.name}</span>
                  {n > 0 && <span className="badge-count" style={{background:'#0d1f14',color:'#3fb950'}}>{n}</span>}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      <div className="divider" />
      <div style={{padding:'10px 14px',fontSize:'11px',color:'var(--text-5)'}}>
        <div>{data.videos.length} videos indexed</div>
        {data.last_updated && (
          <div>Updated {new Date(data.last_updated).toLocaleDateString()}</div>
        )}
      </div>
    </nav>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(DEMO_DATA);
  const [selected, setSelected] = useState('new');
  const [activeVideo, setActiveVideo] = useState(null);
  const [activeVideoDetail, setActiveVideoDetail] = useState(null); // detail JSON for video chat
  const [videoChatTarget, setVideoChatTarget] = useState(null);     // { video, detailData }
  const [searchQuery, setSearchQuery] = useState('');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [chatInitQuery, setChatInitQuery] = useState(null);
  const [darkMode, setDarkMode] = useState(() => {
    try { return localStorage.getItem('signal_dark_mode') !== 'light'; } catch { return true; }
  });

  // Apply theme to document
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
    try { localStorage.setItem('signal_dark_mode', darkMode ? 'dark' : 'light'); } catch {}
  }, [darkMode]);

  useEffect(() => {
    fetch('/data/index.json')
      .then(r => { if (!r.ok) throw new Error('Not found'); return r.json(); })
      .then(d => { if (d?.videos?.length > 0) setData(d); })
      .catch(() => {/* silently use DEMO_DATA */});
  }, []);

  function handleVideoClick(video) {
    setActiveVideo(video);
    setActiveVideoDetail(null);
    setVideoChatTarget(null);
    setSidebarOpen(false);
  }

  function handleBackFromVideo() {
    setActiveVideo(null);
    setActiveVideoDetail(null);
    setVideoChatTarget(null);
  }

  function handleChatFromVideo(topic) {
    setChatInitQuery(`What are different channels saying about: ${topic}`);
    setSelected('chat');
    setActiveVideo(null);
    setVideoChatTarget(null);
  }

  function handleVideoChatOpen(video, detailData) {
    setVideoChatTarget({ video, detailData });
  }

  function handleBackFromVideoChat() {
    setVideoChatTarget(null);
  }

  function handleSelect(sel) {
    setSelected(sel);
    setActiveVideo(null);
    setVideoChatTarget(null);
    setSearchQuery('');
    if (sel !== 'chat') setChatInitQuery(null);
  }

  function toggleDark() {
    setDarkMode(prev => !prev);
  }

  const isSearching = searchQuery.trim().length > 2;

  function renderMain() {
    if (isSearching) return <SearchView query={searchQuery} data={data} onVideo={handleVideoClick} />;
    if (videoChatTarget) return (
      <VideoChatView
        video={videoChatTarget.video}
        detailData={videoChatTarget.detailData}
        data={data}
        onBack={handleBackFromVideoChat}
      />
    );
    if (activeVideo) return (
      <VideoDetailView
        video={activeVideo}
        data={data}
        onBack={handleBackFromVideo}
        onChat={handleChatFromVideo}
        onVideoChat={handleVideoChatOpen}
      />
    );
    if (selected === 'new') return <WhatsNewView data={data} onVideo={handleVideoClick} />;
    if (selected === 'weekly') return <WeeklyWrapView data={data} />;
    if (selected === 'chat') return <ChatView data={data} initialQuery={chatInitQuery} key={chatInitQuery} />;
    if (selected === 'graph') return <KnowledgeGraphView data={data} onVideo={handleVideoClick} onSelectChannel={(chId) => handleSelect(`ch:${chId}`)} />;
    if (selected === 'disagree') return <TopicConnectionMatrix data={data} onVideo={handleVideoClick} />;
    if (selected === 'quotes') return <QuoteBankView data={data} onVideo={handleVideoClick} />;
    if (selected === 'timeline') return <TimeMachineView data={data} onVideo={handleVideoClick} />;
    if (selected === 'contradictions') return <ContradictionView data={data} onVideo={handleVideoClick} />;
    if (selected === 'diff') return <WeeklyDiffView data={data} onVideo={handleVideoClick} />;
    if (selected === 'thesis') return <ThesisBuilderView data={data} onVideo={handleVideoClick} />;
    if (selected.startsWith('ch:')) return <ChannelView channelId={selected.replace('ch:', '')} data={data} onVideo={handleVideoClick} />;
    return <WhatsNewView data={data} onVideo={handleVideoClick} />;
  }

  return (
    <div>
      <div className={`overlay ${sidebarOpen ? 'open' : ''}`} onClick={() => setSidebarOpen(false)} />

      <Sidebar
        data={data}
        selected={selected}
        onSelect={handleSelect}
        searchQuery={searchQuery}
        onSearch={q => { setSearchQuery(q); if (q.length > 0) { setActiveVideo(null); setVideoChatTarget(null); } }}
        isOpen={sidebarOpen}
        onClose={() => setSidebarOpen(false)}
        darkMode={darkMode}
        onToggleDark={toggleDark}
      />

      <div className="main-content">
        <div className="mobile-header">
          <button onClick={() => setSidebarOpen(!sidebarOpen)}
            style={{background:'none',border:'none',color:'var(--text-1)',fontSize:'20px',cursor:'pointer',padding:'4px'}}>
            ☰
          </button>
          <span style={{fontSize:'16px',fontWeight:'600',color:'var(--text-1)'}}>📡 Signal</span>
        </div>
        {renderMain()}
      </div>

      <a href="../HOME.html" className="home-btn" title="Back to Cowork OS Home">
        ← Home
      </a>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
